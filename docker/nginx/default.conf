server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Statische Assets direkt ausliefern, kein PHP-Overhead
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Alle anderen Requests an Symfony FPM
    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        # Verhindert direkte Ausführung anderer PHP-Dateien
        internal;
    }

    # Alles andere ablehnen
    location ~ \.php$ {
        return 404;
    }

    # Sicherheits-Header
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    error_log  /var/log/nginx/error.log  warn;
    access_log /var/log/nginx/access.log combined;
}
