# ─── Wildcard-Redirect: <project>.byte-artist.de → projekte.byte-artist.de/<project> ───
#
# Einzuspielen auf dem zentralen nginx des Hetzner-Servers.
# Greift für alle Subdomains der Form <slug>.byte-artist.de und leitet permanent
# auf https://projekte.byte-artist.de/<slug> weiter (inkl. Pfad und Query-String).
#
# Voraussetzung: Wildcard-DNS *.byte-artist.de zeigt auf den Server.
# Voraussetzung: Wildcard-Zertifikat für *.byte-artist.de liegt vor, z. B. via Certbot:
#   certbot certonly --nginx -d "*.byte-artist.de" -d "byte-artist.de"

server {
    listen      443 ssl;
    listen      [::]:443 ssl;

    # Greift für ALLE Subdomains — der Slug landet in $subdomain
    server_name ~^(?<subdomain>[^.]+)\.byte-artist\.de$;

    ssl_certificate     /etc/letsencrypt/live/byte-artist.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/byte-artist.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # "projekte" selbst nicht weiterleiten — das ist der Zielserver
    if ($subdomain = "projekte") {
        return 444;
    }

    # www und andere bekannte Non-Projekt-Subdomains ausschließen
    if ($subdomain = "www") {
        return 444;
    }

    # www und andere bekannte Non-Projekt-Subdomains ausschließen
    if ($subdomain = "mail") {
        return 444;
    }

    # 301-Redirect mit vollem Pfad + Query-String
    return 301 https://projekte.byte-artist.de/$subdomain$request_uri;
}

# ─── HTTP → HTTPS für Subdomains ────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name ~^(?<subdomain>[^.]+)\.byte-artist\.de$;

    return 301 https://$host$request_uri;
}
