; ── Basis-Einstellungen (Entwicklung) ────────────────────────────────────────
memory_limit        = 256M
upload_max_filesize = 16M
post_max_size       = 16M
max_execution_time  = 60
expose_php          = Off
display_errors      = On
log_errors          = On
error_log           = /proc/self/fd/2
date.timezone       = Europe/Berlin
