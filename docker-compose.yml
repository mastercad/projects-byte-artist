services:

  # ─── PHP-FPM (Symfony) ──────────────────────────────────────────────────────
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PHP_IMAGE:-ghcr.io/byte-artist/ba-projekte-php}:${IMAGE_TAG:-latest}
    container_name: ba_projekte_php
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: "${APP_SECRET}"
    volumes:
      - app_log:/var/www/html/var/log
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 9000 || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  5

  # ─── nginx ──────────────────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    image: ${NGINX_IMAGE:-ghcr.io/byte-artist/ba-projekte-nginx}:${IMAGE_TAG:-latest}
    container_name: ba_projekte_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8050}:80"
    depends_on:
      php:
        condition: service_healthy

volumes:
  app_log:
